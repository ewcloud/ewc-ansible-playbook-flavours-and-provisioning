name: Semantic Release

on:
  workflow_run:
    workflows: ["Ansible Lint"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Generate token for EWC Semantic Releaser GitHub App
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.EWC_SEMANTIC_RELEASES_CLIENT_ID }}
          private-key: ${{ secrets.EWC_SEMANTIC_RELEASES_PRIVATE_KEY }}
    
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Verify dependency signatures
        run: npm audit signatures || echo "::warning::Some dependency signatures could not be verified!"

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

